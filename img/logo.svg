<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3282b8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c840;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a227;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="visor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3b66;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Helmet body — classic deep sea diver bell shape -->
  <ellipse cx="100" cy="88" rx="58" ry="62" fill="url(#brass)" stroke="#c9a227" stroke-width="2"/>

  <!-- Helmet top dome -->
  <ellipse cx="100" cy="40" rx="30" ry="14" fill="#e8c840" stroke="#c9a227" stroke-width="1.5"/>

  <!-- Top valve/handle -->
  <rect x="94" y="22" width="12" height="10" rx="3" fill="#c9a227" stroke="#9a7d1a" stroke-width="1"/>
  <circle cx="100" cy="22" r="6" fill="#c4a830" stroke="#9a7d1a" stroke-width="1.5"/>

  <!-- Face plate (round porthole) -->
  <circle cx="100" cy="85" r="36" fill="url(#visor)" stroke="#e8c840" stroke-width="4"/>

  <!-- Porthole inner ring -->
  <circle cx="100" cy="85" r="30" fill="none" stroke="#c4a830" stroke-width="2"/>

  <!-- Visor reflection -->
  <ellipse cx="88" cy="76" rx="10" ry="7" fill="#00e5ff" opacity="0.12" transform="rotate(-15 88 76)"/>

  <!-- Data bars inside visor (the "gaming data" element) -->
  <rect x="78" y="82" width="6" height="18" rx="1.5" fill="#00e5ff" opacity="0.75"/>
  <rect x="87" y="76" width="6" height="24" rx="1.5" fill="#00e5ff" opacity="0.85"/>
  <rect x="96" y="79" width="6" height="21" rx="1.5" fill="#00b0ff" opacity="0.75"/>
  <rect x="105" y="73" width="6" height="27" rx="1.5" fill="#00e5ff" opacity="0.9"/>
  <rect x="114" y="85" width="6" height="15" rx="1.5" fill="#00b0ff" opacity="0.65"/>

  <!-- Side bolts (left) -->
  <circle cx="50" cy="72" r="5" fill="#c9a227" stroke="#9a7d1a" stroke-width="1.5"/>
  <circle cx="50" cy="72" r="2" fill="#9a7d1a"/>
  <circle cx="48" cy="100" r="5" fill="#c9a227" stroke="#9a7d1a" stroke-width="1.5"/>
  <circle cx="48" cy="100" r="2" fill="#9a7d1a"/>

  <!-- Side bolts (right) -->
  <circle cx="150" cy="72" r="5" fill="#c9a227" stroke="#9a7d1a" stroke-width="1.5"/>
  <circle cx="150" cy="72" r="2" fill="#9a7d1a"/>
  <circle cx="152" cy="100" r="5" fill="#c9a227" stroke="#9a7d1a" stroke-width="1.5"/>
  <circle cx="152" cy="100" r="2" fill="#9a7d1a"/>

  <!-- Collar/base plate -->
  <rect x="48" y="135" width="104" height="16" rx="4" fill="#c4a830" stroke="#c9a227" stroke-width="2"/>
  <rect x="55" y="140" width="90" height="6" rx="2" fill="#c9a227" opacity="0.5"/>

  <!-- Shoulder plates -->
  <path d="M 48 143 Q 30 148 20 165 L 40 165 Q 45 150 52 145 Z" fill="#c4a830" stroke="#c9a227" stroke-width="1"/>
  <path d="M 152 143 Q 170 148 180 165 L 160 165 Q 155 150 148 145 Z" fill="#c4a830" stroke="#c9a227" stroke-width="1"/>

  <!-- Bubbles -->
  <circle cx="145" cy="30" r="7" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="158" cy="16" r="4.5" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <circle cx="152" cy="6" r="3" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.25"/>

  <!-- Text -->
  <text x="100" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#bbe1fa" letter-spacing="2">GAMINGDIVER</text>
</svg>
